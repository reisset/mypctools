# Starship Config v2.0
# Two-line prompt with OS icon + username
# git_status DISABLED for performance

format = """
[тФМтФА](bold cyan) $os $username at $directory$git_branch${custom.docker}$python$cmd_duration
[тФФтФА](bold cyan)$character"""

add_newline = true

[character]
success_symbol = "[тЭп](bold green)"
error_symbol = "[тЭп](bold red)"

[os]
disabled = false
format = "[$symbol]($style)"
style = "bold white"

[os.symbols]
Arch = "яМГ "
Debian = "яМЖ "
Fedora = "яМК "
Linux = "яЕ╝ "
Manjaro = "яМТ "
Mint = "яМО "
NixOS = "яМУ "
Pop = "яМк "
Raspbian = "яМХ "
Ubuntu = "яМЫ "
Unknown = "яЕ╝ "
CachyOS = "яМГ "

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold green"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"
read_only = " ґ░М╛"

[git_branch]
format = ' on \[$branch\]($style)'
style = "bold orange"

[git_status]
disabled = true

[custom.docker]
description = "Shows docker icon in directories with compose/Dockerfile"
command = "echo docker"
files = ["compose.yaml", "compose.yml", "docker-compose.yaml", "docker-compose.yml", "Dockerfile"]
format = "via [яИЯ](bold blue) "

[python]
format = '[ $virtualenv]($style)'
style = "yellow"
detect_extensions = []
detect_files = []

[nodejs]
disabled = true

[package]
disabled = true

[cmd_duration]
min_time = 2000
format = " took [$duration]($style)"
style = "bold yellow"
